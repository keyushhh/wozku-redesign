<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Wozku Redesign</title>
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link rel="preload" href="https://fonts.gstatic.com/s/spacegrotesk/v22/V8mDoQDjQSkFtoMM3T6r8E7mPbF4Cw.woff2" as="font" type="font/woff2" crossorigin />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      (function() {
        try {
          // One-time branding migration to new defaults
          if (localStorage.getItem('wozku-branding-v2') !== 'true') {
            localStorage.removeItem('wozku-hero-visual');
            localStorage.removeItem('wozku-radius-mode');
            localStorage.removeItem('wozku-theme');
            localStorage.removeItem('wozku-custom-hex');
            localStorage.setItem('wozku-branding-v2', 'true');
          }
          var root = document.documentElement;
          var theme = localStorage.getItem('wozku-theme') || 'emerald';
          if (theme && theme !== 'indigo' && theme !== 'custom') root.classList.add('theme-' + theme);
          var palette = localStorage.getItem('wozku-custom-palette');
          if (theme === 'custom' && palette) {
            var colors = JSON.parse(palette);
            for (var key in colors) {
              root.style.setProperty(key, colors[key]);
            }
          }
        } catch (e) {
          console.error('Failed to pre-hydrate custom theme:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
