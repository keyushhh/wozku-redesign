<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wozku Redesign</title>
    <script>
      (function() {
        try {
          var root = document.documentElement;
          var theme = localStorage.getItem('wozku-theme');
          if (localStorage.getItem('wozku-dark') === 'true') root.classList.add('dark');
          if (theme && theme !== 'indigo' && theme !== 'custom') root.classList.add('theme-' + theme);
          var palette = localStorage.getItem('wozku-custom-palette');
          if (theme === 'custom' && palette) {
            var colors = JSON.parse(palette);
            for (var key in colors) {
              root.style.setProperty(key, colors[key]);
            }
          }
        } catch (e) {
          console.error('Failed to pre-hydrate custom theme:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
